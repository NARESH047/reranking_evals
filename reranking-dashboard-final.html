    <script>
        let allResults = [];
        let showImages = true;

        function renderProduct(product) {
            if (!product || !product.name) {
                return '<div class="empty-cell">—</div>';
            }

            const imageUrl = product.image ? `${product.image}?w=120&h=150&fit=fill` : '';
            return `
                <div class="product-cell">
                    ${imageUrl ? `<img src="${imageUrl}" class="product-image" alt="${product.name}" onerror="this.style.display='none'">` : ''}
                    <div class="product-info">
                        <div class="product-name">${product.name}</div>
                        ${product.brand ? `<div class="product-brand">${product.brand}</div>` : ''}
                        ${product.category ? `<div class="product-category">${product.category}</div>` : ''}
                        ${product.price ? `<div class="product-price">₹${product.price}</div>` : ''}
                    </div>
                </div>
            `;
        }

        function renderQueryCard(result) {
            let tableRows = '';
            const maxPos = Math.max(
                result.prodProducts ? result.prodProducts.length : 0,
                result.localProducts ? result.localProducts.length : 0
            );

            for (let pos = 1; pos <= Math.min(20, maxPos); pos++) {
                const currentProd = result.prodProducts && result.prodProducts[pos - 1] ? result.prodProducts[pos - 1] : null;
                const variantProd = result.localProducts && result.localProducts[pos - 1] ? result.localProducts[pos - 1] : null;

                tableRows += `
                    <tr>
                        <td class="position">#${pos}</td>
                        <td class="current">${renderProduct(currentProd)}</td>
                        <td class="variant">${renderProduct(variantProd)}</td>
                    </tr>
                `;
            }

            return `
                <div class="query-card">
                    <div class="query-header">
                        <div class="query-title">${result.query}</div>
                    </div>
                    <table class="results-table">
                        <thead>
                            <tr>
                                <th class="position">Position</th>
                                <th class="current">Current (Prod)</th>
                                <th class="variant">Variant (Local)</th>
                            </tr>
                        </thead>
                        <tbody>
                            ${tableRows}
                        </tbody>
                    </table>
                </div>
            `;
        }

        function renderDashboard(filteredResults = allResults) {
            const html = filteredResults.map(renderQueryCard).join('');
            document.getElementById('queriesContainer').innerHTML = html || '<p style="padding: 20px; color: #999;">No results found</p>';

            document.querySelectorAll('.product-image').forEach(img => {
                if (!showImages) {
                    img.classList.add('hidden');
                }
            });
        }

        function filterResults(query) {
            if (!query.trim()) {
                renderDashboard(allResults);
                return;
            }
            const filtered = allResults.filter(result =>
                result.query.toLowerCase().includes(query.toLowerCase())
            );
            renderDashboard(filtered);
        }

        // Load data
        const dataElement = document.getElementById('dataStore');
        try {
            allResults = JSON.parse(dataElement.textContent);
            renderDashboard();
        } catch (e) {
            console.error('Error loading data:', e);
        }

        // Event listeners
        document.getElementById('searchInput').addEventListener('input', (e) => {
            filterResults(e.target.value);
        });

        document.getElementById('imageToggleBtn').addEventListener('click', (btn) => {
            showImages = !showImages;
            btn.target.textContent = showImages ? 'Hide Images' : 'Show Images';
            btn.target.classList.toggle('active');

            document.querySelectorAll('.product-image').forEach(img => {
                if (showImages) {
                    img.classList.remove('hidden');
                } else {
                    img.classList.add('hidden');
                }
            });
        });
    </script>
